<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Admin</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Admin - Lägg till kurs</h1>

<form id="courseForm">

<label>Kurstitel</label>
<input type="text" id="title" required>

<label>Kursnummer</label>
<input type="text" id="courseNumber" required>

<label>Antal dagar</label>
<input type="number" id="days" required>

<label>Kostnad</label>
<input type="number" id="price" required>

<label>Startdatum</label>
<input type="date" id="date" required>

<label>Typ</label>
<select id="type">
<option value="Classroom">Classroom</option>
<option value="Distans">Distans</option>
</select>

<label>Bild URL</label>
<input type="text" id="image" placeholder="https://..." required>

<button type="submit">Skapa kurs</button>

</form>

<h2>Bokningar per kurs</h2>

<div id="bookingList"></div>

<script type="module" src="./js/admin.js"></script>

</body>

</html>
